# Portable defaults only. Point cargo at your PMIx install via env:
#   export PMIX_PREFIX=/path/to/pmix   # or PRRTE install that bundles libpmix
#   export LD_LIBRARY_PATH=$PMIX_PREFIX/lib${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}
# See .cargo/config.toml.example for optional local rpath overrides (do not commit machine paths).

[target.x86_64-unknown-linux-gnu]
rustflags = ["-C", "target-cpu=native"]
